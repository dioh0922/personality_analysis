<div [class]="themeService.theme()">
  <mat-toolbar [class.terminal-toolbar]="themeService.theme() === 'dashboard'" 
               [color]="themeService.theme() === 'dashboard' ? undefined : 'primary'" 
               class="main-toolbar">
    <button
      mat-icon-button
      [matMenuTriggerFor]="menu"
      aria-label="Menu icon">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item routerLink="/beer">ビール</button>
      <button mat-menu-item routerLink="/sake">日本酒</button>
      <button mat-menu-item [matMenuTriggerFor]="aiMenu">AI検討</button>
      <button mat-menu-item [matMenuTriggerFor]="evacuationMenu">退避</button>
    </mat-menu>
    <mat-menu #evacuationMenu="matMenu">
      <button mat-menu-item><dump-beer></dump-beer></button>
      <button mat-menu-item><dump-discussion></dump-discussion></button>
      <button mat-menu-item><dump-sake></dump-sake></button>
    </mat-menu>
    <mat-menu #aiMenu="matMenu">
      <button mat-menu-item routerLink="/todo">タスク</button>
      <button mat-menu-item routerLink="/recommend">おすすめ判定</button>
      <button mat-menu-item routerLink="/discussion">脳内会議</button>
    </mat-menu>

    @if (themeService.theme() === 'dashboard') {
      <span class="terminal-logo">TERMINAL v20.0.0</span>
    } @else {
      <span class="toolbar-title">{{ title() }}</span>
    }
    
    <span style="flex: 1 1 auto;"></span>
    
    <div class="toolbar-actions">
      <app-theme-switcher></app-theme-switcher>
      <login-button></login-button>
    </div>
  </mat-toolbar>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
