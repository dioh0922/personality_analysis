<div class="container">

  <div class="discussion-grid">
    <div class="input-row">
      <mat-form-field>
        <mat-label>議題</mat-label>
        <textarea matInput rows="4" cols="20" [(ngModel)]="prompt"></textarea>
      </mat-form-field>
      <button (click)="submit()" mat-raised-button color="primary" class="submit-btn">
        <mat-icon style="font-size: 16px;">send</mat-icon>
      </button>
      <button (click)="saveDiscussion()" mat-raised-button color="accent" class="submit-btn">
        <mat-icon style="font-size: 16px;">save</mat-icon>
      </button>
    </div>

    <div class="input-row">
      <judge-summary *ngIf="judge.agree != null" [agree]="judge.agree" [summary]="judge.summary" ></judge-summary>
    </div>

    <div class="input-row" *ngIf="persona.length > 0">
      個別の意見
    </div>

    <judge-summary *ngFor="let card of persona" [agree]="card.agree" [summary]="card.summary"></judge-summary>
  </div>
</div>

<div class="loading-overlay" *ngIf="isLoading">
  <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
