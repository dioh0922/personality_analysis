<mat-card class="todo-card">
  <mat-card-header>
    <div mat-card-avatar class="priority-indicator" [class]="priority() === '高' ? 'high' : (priority() === '中' ? 'medium' : 'low')"></div>
    <mat-card-title>
      <mat-chip-set>
        <mat-chip [class]="priority() === '高' ? 'priority-high' : (priority() === '中' ? 'priority-medium' : 'priority-low')">
          {{ priority() }}
        </mat-chip>
      </mat-chip-set>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="reason-text">{{ reason() }}</p>
  </mat-card-content>
</mat-card>
